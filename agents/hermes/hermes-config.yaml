provider: eastrouter
base_url: https://api.eastrouter.com/v1
api_key: ${You should not share your API key publicly.}
model: deepseek/deepseek-v4-pro

memory: true
memory_type: file
memory_file: hermes_memory.json

slack:
  app_token: ${You should not share your app token publicly.}
  bot_token: ${You should not share your bot token publicly.}
  channels:
    - sprint-main
    - agent-coder
    - human-review

system_prompt: "You are Hermes, the Product Owner/Orchestrator AI. Your job is to: 1. Break down the sprint goal into small, scoped issues. 2. Assign each issue to OpenClaw one at a time in #agent-coder. 3. Keep track of what's done vs what's left. 4. Review reports from OpenClaw. Always communicate in Slack channels. Keep sprints TIGHT - no bloated issues."